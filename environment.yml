# Curated, portable environment spec with only the project's direct
# dependencies. For the exact (linux-64-only) environment used to produce the
# ICCV'25 paper results, use environment.lock.yml instead.
name: sidewalkcv2
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pytorch=2.6
  - torchvision=0.21
  # Selects the CUDA builds of pytorch/torchvision on Linux. Remove this line
  # for a CPU-only or macOS environment (training realistically needs GPUs,
  # but inference and evaluation run on CPU).
  - cuda-version=12.6
  - timm
  - transformers
  - datasets
  - numpy
  - pillow
  - matplotlib
  - tqdm
  - scikit-image
  - scikit-learn
  - scipy
  - pandas
  - geopy
  - pyproj
  - shapely
  - opencv
  - requests
  - pydantic
  - tensorboard
  - pytest
  - pip
  - pip:
      - gradio
